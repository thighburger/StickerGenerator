name: CI

on:
  push:
  pull_request:

jobs:
  # Next.js: 타입체크 + 프로덕션 빌드
  next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pet-sticker-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pet-sticker-next/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ML: 린트 + 테스트 + MLflow 학습 + 학습 artifact 업로드
  ml:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pet-sticker-ml
    env:
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pet-sticker-ml/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Ruff 린트
        run: ruff check src tests
      - name: Pytest
        run: python -m pytest -q
      - name: MLflow 학습
        run: python -m pet_sticker_ml.train --tracking-uri file:./mlruns --data-version v1
      - name: 학습 artifact 업로드
        uses: actions/upload-artifact@v4
        with:
          name: champion-model
          path: |
            pet-sticker-ml/champion/
            pet-sticker-ml/mlruns/

  # 통합 하네스(quick, strict): 앱↔ML 연동·로그·모델정보 등 교차 검증
  harness:
    runs-on: ubuntu-latest
    needs: [next, ml]
    env:
      HARNESS_STRICT: "1"
      PET_STICKER_ML_PYTHON: python3.12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pet-sticker-next/package-lock.json
      - name: Next 의존성 설치
        working-directory: pet-sticker-next
        run: npm ci
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pet-sticker-ml/requirements-dev.txt
      - name: ML 의존성 설치
        working-directory: pet-sticker-ml
        run: pip install -r requirements-dev.txt
      - name: 하네스 실행(quick)
        run: node scripts/final-harness.mjs

  # Docker 빌드(push 한정, PR 지연 절감)
  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: ML 이미지 빌드
        run: docker build -t pet-sticker-ml:ci ./pet-sticker-ml
      - name: Next 이미지 빌드
        run: docker build -t pet-sticker-next:ci ./pet-sticker-next
