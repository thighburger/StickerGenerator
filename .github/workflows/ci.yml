name: CI

on:
  push:
  pull_request:

jobs:
  next:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pet-sticker-next
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: pet-sticker-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  ml:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pet-sticker-ml/requirements.txt

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pet-sticker-ml/requirements.txt

      - name: Run ML tests
        env:
          PYTHONPATH: pet-sticker-ml/src
        run: pytest -q pet-sticker-ml/tests

      - name: Train model with MLflow
        env:
          PYTHONPATH: pet-sticker-ml/src
        run: |
          python -m pet_sticker_ml.train \
            --tracking-uri file:pet-sticker-ml/mlruns \
            --model-out /tmp/sticker-quality-model.json \
            --registry-dir /tmp/sticker-quality-registry \
            --n-samples 700 \
            --seed 42

      - name: Upload MLflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sticker-quality-mlflow
          path: |
            pet-sticker-ml/mlruns
            /tmp/sticker-quality-model.json
            /tmp/sticker-quality-registry

  docker:
    runs-on: ubuntu-latest
    needs:
      - next
      - ml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pet-sticker-next:ci pet-sticker-next
